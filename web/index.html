  <meta name="webgl" content="enabled">

  <link rel="manifest" href="manifest.json">
  
  <!-- Preload critical resources -->
  <link rel="preload" href="assets/fonts/MaterialIcons-Regular.otf" as="font" type="font/otf" crossorigin>
  
  <style>
    /* Loading screen styles */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #FF6EB4 0%, #3B82F6 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
    }
    .loading-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }
    .loading-text {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .loading-subtext {
      font-size: 16px;
      opacity: 0.8;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    /* Responsive design */
    @media (max-width: 768px) {
      .loading-text { font-size: 20px; }
      .loading-subtext { font-size: 14px; }
      .loading-logo { width: 60px; height: 60px; }
    }
    
    /* Hide loading screen when Flutter loads */
    .flutter-loaded .loading {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div class="loading" id="loading">
    <div class="loading-logo">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2L2 7V10C2 16 6 20.5 12 22C18 20.5 22 16 22 10V7L12 2Z"/>
      </svg>
    </div>
    <div class="loading-text">Let's Crease</div>
    <div class="loading-subtext">Loading your paper folding experience...</div>
  </div>
  
  <!-- Flutter app container -->
  <div id="flutter-app"></div>
  
  <script>
    // Performance monitoring
    window.addEventListener('load', function() {
      console.log('Web app loaded in:', performance.now(), 'ms');
    });
    
    // WebGL detection and optimization
    function checkWebGLSupport() {
      try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        return !!gl;
      } catch (e) {
        return false;
      }
    }
    
    if (!checkWebGLSupport()) {
      console.warn('WebGL not supported - 3D features may be limited');
    }
    
    // Hide loading screen when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      document.body.classList.add('flutter-loaded');
      document.getElementById('loading').style.display = 'none';
    });
  </script>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <script>

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
